<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="bg-white px-10 py-10">
            <div class="text-center">
                <h1 class="text-3xl font-semibold text-slate-900">Staff Login</h1>
                <p class="mt-3 text-sm text-slate-500">Internal access for team members only.</p>
            </div>

            <form method="post" class="mt-10 space-y-6">
                {% csrf_token %}
                {% if form.non_field_errors %}
                <div class="rounded-2xl bg-rose-50 border border-rose-200 px-4 py-3 text-sm text-rose-700">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <div class="space-y-2">
                    <label for="id_username" class="block text-sm font-medium text-slate-700">Email or username</label>
                    <input id="id_username" name="username" type="text" autocomplete="username" value="{{ form.username.value|default_if_none:'' }}" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-base text-slate-900 placeholder-slate-400 focus:border-[#1a73e8] focus:outline-none focus:ring-2 focus:ring-[#1a73e8]/20" required>
                </div>

                <div class="space-y-2">
                    <label for="id_password" class="block text-sm font-medium text-slate-700">Password</label>
                    <input id="id_password" name="password" type="password" autocomplete="current-password" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-base text-slate-900 placeholder-slate-400 focus:border-[#1a73e8] focus:outline-none focus:ring-2 focus:ring-[#1a73e8]/20" required>
                </div>

                <button type="submit" class="w-full rounded-2xl bg-[#1a73e8] px-5 py-3 text-white text-base font-semibold shadow-lg hover:bg-[#1669c1] transition">Sign in</button>
            </form>

            <div class="mt-8 rounded-3xl bg-slate-50 border border-slate-200 p-5 text-sm text-slate-600">
                <p class="font-medium text-slate-800">Staff access only</p>
                <p class="mt-2">This page is styled like a clean company form. Use your staff credentials to see bookings, queries, and chat history.</p>
            </div>

            <div class="mt-6 text-center text-sm text-slate-500">
                <a href="{% url 'landing_page' %}" class="text-[#1a73e8] hover:underline">Return home</a>
            </div>
        </div>
    </div>
</body>
</html>
