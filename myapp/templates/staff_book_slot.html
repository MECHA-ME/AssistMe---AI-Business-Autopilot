<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Book Slot - Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold text-gray-900">Book Slot (Staff)</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="{% url 'admin_dashboard' %}" class="text-gray-700 hover:text-gray-900">Back to Dashboard</a>
                    <a href="{% url 'logout' %}" class="text-gray-700 hover:text-gray-900">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto py-8 px-4">
        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="p-4 rounded {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="bg-white shadow rounded-lg p-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Create Booking on Behalf of Customer</h2>
            <p class="text-gray-600 mb-6">Use this form to book an appointment for a customer.</p>
            
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label for="customer_phone" class="block text-sm font-medium text-gray-700">Customer Phone</label>
                    <input type="text" id="customer_phone" name="customer_phone" placeholder="+1234567890 or username" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2 border">
                </div>
                <div>
                    <label for="service" class="block text-sm font-medium text-gray-700">Service</label>
                    <select id="service" name="service" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2 border">
                        <option value="">-- Select Service --</option>
                        <option value="PC Hardware Consultation">PC Hardware Consultation</option>
                        <option value="Saloon Appointment">Saloon Appointment</option>
                        <option value="Automobile Service">Automobile Service</option>
                        <option value="Hardware Shop">Hardware Shop</option>
                        <option value="Food Delivery">Food Delivery</option>
                    </select>
                </div>
                <div>
                    <label for="date" class="block text-sm font-medium text-gray-700">Date</label>
                    <input type="date" id="date" name="date" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2 border">
                </div>
                <div>
                    <label for="time" class="block text-sm font-medium text-gray-700">Time</label>
                    <select id="time" name="time" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2 border">
                        <option value="">-- Select Time --</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="14:00">2:00 PM</option>
                        <option value="16:00">4:00 PM</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 font-semibold">Create Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
