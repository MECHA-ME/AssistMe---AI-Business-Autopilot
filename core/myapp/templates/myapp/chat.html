{% extends 'myapp/base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="flex items-center mb-4">
        <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="margin-right: 1.5rem; padding: 0.5rem 1rem;">&larr; Back</a>
        <h2 style="margin: 0; display:flex; align-items: center; gap: 0.5rem;">
            <div style="width:10px; height:10px; background:var(--secondary); border-radius:50%; box-shadow:0 0 10px var(--secondary);"></div>
            Chat with {{ other_user.username }}
        </h2>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chatWindow">
            {% for msg in messages_list %}
                <div class="message-bubble {% if msg.sender == request.user %}message-sent{% else %}message-received{% endif %}">
                    <div>{{ msg.content }}</div>
                    <div style="font-size: 0.7rem; opacity: 0.7; margin-top: 0.25rem; text-align: right;">
                        {{ msg.timestamp|date:"M d, g:i a" }}
                    </div>
                </div>
            {% empty %}
                <p class="text-center text-muted mt-8">No messages yet. Say hello!</p>
            {% endfor %}
        </div>
        <form method="post" class="chat-input" id="chatForm">
            {% csrf_token %}
            {{ form.content }}
            <button type="submit" class="btn btn-primary" style="align-self: center; height: 100%;">Send</button>
        </form>
    </div>
</div>

<script>
    // Style text area
    var textarea = document.querySelector('.chat-input textarea');
    textarea.classList.add('form-control');
    textarea.style.resize = 'none';
    textarea.style.flex = '1';

    // Auto-scroll to bottom of chat
    var chatWindow = document.getElementById('chatWindow');
    chatWindow.scrollTop = chatWindow.scrollHeight;

    // Submit form on Enter (without shift)
    textarea.addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            document.getElementById('chatForm').submit();
        }
    });
</script>
{% endblock %}
